name: Bluesky Reply Bot

on:
  schedule:
    # every 2 months, on the 1st day at 08:00 UTC
    - cron: "0 8 1 */2 *"
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run reply bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          SEARCH_QUERIES: ${{ secrets.SEARCH_QUERIES }}
        run: |
          python reply_bot.py
